name: Deploy to Vultr

on:
  push:
    branches: [main]
    paths:
      - "backend-nest/**"
      - "backend-ai/**"
      - "docker-compose.prod.yml"
      - "docker-compose.yml"
      - "scripts/vps-deploy.sh"
      - "config/caddy/**"
      - "config/internal-test-portal/**"
      - "config/systemd/**"
      - ".github/workflows/deploy-vultr.yml"
  workflow_dispatch:

concurrency:
  group: vultr-production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate deploy configuration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder env files for compose validation
        run: |
          mkdir -p backend-nest backend-ai
          [ -f backend-nest/.env ] || echo "PLACEHOLDER=ci" > backend-nest/.env
          [ -f backend-ai/.env ] || echo "PLACEHOLDER=ci" > backend-ai/.env

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  deploy:
    name: Deploy on Vultr
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          password: ${{ secrets.VULTR_PASSWORD }}
          port: ${{ secrets.VULTR_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/engr-app"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR. Clone it first and add server .env files."
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            # Match force-pushed main (pull --ff-only fails after history rewrite).
            git reset --hard origin/main

            if [ ! -f "backend-nest/.env" ] || [ ! -f "backend-ai/.env" ]; then
              echo "Missing backend-nest/.env or backend-ai/.env on server."
              exit 1
            fi

            bash scripts/vps-deploy.sh

            # Tester portal: static files on /opt/engr-apk (port 4003 already in use on host).
            bash scripts/deploy-internal-test-portal.sh || true

            docker compose -f docker-compose.prod.yml ps
