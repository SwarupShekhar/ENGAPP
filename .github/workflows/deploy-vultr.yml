name: Deploy to Vultr

on:
  push:
    branches: [main]
    paths:
      - "backend-nest/**"
      - "backend-ai/**"
      - "docker-compose.prod.yml"
      - "config/caddy/**"
      - "config/systemd/**"
      - ".github/workflows/deploy-vultr.yml"
  workflow_dispatch:

concurrency:
  group: vultr-production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate deploy configuration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder env files for compose validation
        run: |
          mkdir -p backend-nest backend-ai
          [ -f backend-nest/.env ] || echo "PLACEHOLDER=ci" > backend-nest/.env
          [ -f backend-ai/.env ] || echo "PLACEHOLDER=ci" > backend-ai/.env

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  deploy:
    name: Deploy on Vultr
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          password: ${{ secrets.VULTR_PASSWORD }}
          port: ${{ secrets.VULTR_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/engr-app"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR. Clone it first and add server .env files."
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            # Match force-pushed main (pull --ff-only fails after history rewrite).
            git reset --hard origin/main

            if [ ! -f "backend-nest/.env" ] || [ ! -f "backend-ai/.env" ]; then
              echo "Missing backend-nest/.env or backend-ai/.env on server."
              exit 1
            fi

            docker compose -f docker-compose.prod.yml build backend-nest backend-ai

            # Apply DB migrations before boot (image CMD also runs migrate on start).
            docker compose -f docker-compose.prod.yml run --rm --no-deps backend-nest \
              npx prisma migrate deploy

            # Start backends only (caddy/prometheus depend on healthy nest — would fail compose up).
            docker compose -f docker-compose.prod.yml up -d --no-deps backend-nest backend-ai

            echo "Waiting for backend-nest health (up to 120s)..."
            healthy=0
            i=0
            while [ "$i" -lt 24 ]; do
              i=$((i + 1))
              if docker compose -f docker-compose.prod.yml exec -T backend-nest \
                node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" 2>/dev/null; then
                healthy=1
                break
              fi
              sleep 5
            done
            if [ "$healthy" -ne 1 ]; then
              docker compose -f docker-compose.prod.yml logs backend-nest --tail 80
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d caddy prometheus
            docker compose -f docker-compose.prod.yml ps
