name: Backend Nest CI

on:
  push:
    branches: [main]
    paths:
      - "backend-nest/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend-nest/**"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-nest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend-nest/package-lock.json

      - name: Install Dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Build Check
        run: npm run build
