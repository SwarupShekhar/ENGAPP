# EngR Docker Compose — production by default (Vultr-safe).
#
# Host ports MUST stay in 4000–5000 on the VPS. Never bind :3000 or :8001 on the host.
# Containers still listen on 3000 (Nest) and 8001 (AI) internally; prod maps:
#   4001 → Nest, 4010 → AI, 4008 → Caddy, 4003 → tester portal (nginx on host).
#
# Always prefer:  docker compose -f docker-compose.prod.yml ...
# If you run plain `docker compose up` by mistake, this file includes prod so you
# do not hit "Bind for 0.0.0.0:3000 failed".

include:
  - docker-compose.prod.yml
