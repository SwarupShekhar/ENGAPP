services:
  backend-nest:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    env_file:
      - ./backend-nest/.env
    environment:
      AI_ENGINE_URL: http://backend-ai:8001
      FASTAPI_SERVICE_URL: http://backend-ai:8001
      # INTERNAL_API_KEY must match backend-ai/.env (Nest → AI x-api-key + WS tokens)
      PORT: 3000
      NODE_ENV: production
      # FCM push delivery: set FIREBASE_SERVICE_ACCOUNT_JSON in backend-nest/.env
      # (Firebase Console → Project settings → Service accounts → Generate key).
      # Without it, backend-nest logs "[FCM] No service account" and push is disabled.
    ports:
      # Port 4001 is firewall-whitelisted on this Vultr server.
      # Mobile preview builds connect here directly (http://139.84.163.249:4001).
      # Caddy on port 80 also reverse-proxies to this service internally.
      - "0.0.0.0:4001:3000"
    restart: unless-stopped
    networks:
      - internal
    # Reach host Postgres (e.g. :4011) from Linux Docker — use host.docker.internal in DATABASE_URL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    env_file:
      - ./backend-ai/.env
    environment:
      PORT: 8001
      ENVIRONMENT: production
      DEBUG: "false"
      PRON_DEBUG: ""
      TTS_PROVIDER: inworld
      DISABLE_AZURE_TTS: "true"
      # Tutor + calls use Azure Speech STT; Deepgram is opt-in only.
      DEEPGRAM_PRIMARY_STT: "false"
      DEEPGRAM_SECONDARY_TRANSCRIPT: "false"
      # Coaching context (Maya tutor) reads REDIS_URL — must point at the same Redis as backend-nest.
      # Set REDIS_URL in backend-ai/.env on the server (not localhost inside Docker).
    ports:
      # Host 8001 is used by vaidik_backend on this VPS — publish AI on 4010 instead.
      # Container still listens on 8001; Nest reaches it via http://backend-ai:8001 on the Docker network.
      - "0.0.0.0:4010:8001"
    restart: unless-stopped
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/api/health', timeout=4).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # Bind locally on the VPS; do not expose publicly without auth.
      - "127.0.0.1:9090:9090"
    networks:
      - internal
    depends_on:
      backend-nest:
        condition: service_healthy
      backend-ai:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-set-on-vps}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    ports:
      # SSH tunnel: ssh -L 4009:127.0.0.1:4009 user@vultr → http://localhost:4009
      - "127.0.0.1:4009:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - internal
    depends_on:
      - prometheus

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      # Host port 80/443 are used by other services on this VPS; expose Caddy on 4008.
      - "0.0.0.0:4008:80"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      backend-nest:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  grafana_data:
