services:
  backend-nest:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    env_file:
      - ./backend-nest/.env
    environment:
      AI_ENGINE_URL: http://backend-ai:8001
      PORT: 3000
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode !== 200) process.exit(1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    env_file:
      - ./backend-ai/.env
    environment:
      PORT: 8001
      ENVIRONMENT: production
      DEBUG: "false"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      backend-nest:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

