services:
  backend-nest:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    env_file:
      - ./backend-nest/.env
    environment:
      AI_ENGINE_URL: http://backend-ai:8001
      FASTAPI_SERVICE_URL: http://backend-ai:8001
      PORT: 3000
      NODE_ENV: production
    ports:
      # Port 3000 is firewall-whitelisted on this Vultr server.
      # Mobile preview builds connect here directly (http://139.84.163.249:3000).
      # Caddy on port 80 also reverse-proxies to this service internally.
      - "0.0.0.0:3000:3000"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    env_file:
      - ./backend-ai/.env
    environment:
      PORT: 8001
      ENVIRONMENT: production
      DEBUG: "false"
      PRON_DEBUG: ""
      TTS_PROVIDER: inworld
      DISABLE_AZURE_TTS: "true"
    # No external ports — only backend-nest can reach this service.
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/api/health', timeout=4).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      backend-nest:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
